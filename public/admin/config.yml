# =====================================================================
# Decap CMS configuration
# ---------------------------------------------------------------------
# This file tells the CMS what content non-technical staff can edit and
# where it lives in the repo. When someone hits "Publish", Decap commits
# the change to your Git repo, which triggers a rebuild + redeploy.
#
# BEFORE GOING LIVE, set up the backend (see CMS-SETUP.md). The default
# below uses GitHub. For local testing, run `npx decap-server` and open
# http://localhost:4321/admin/ with `local_backend: true` enabled.
# =====================================================================

backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # <-- change this
  branch: main

# Uncomment for local testing with `npx decap-server`:
# local_backend: true

# Where uploaded images (e.g. blog hero images) go. They land in
# public/assets/images and are referenced as /assets/images/<file>.
media_folder: "public/assets/images"
public_folder: "/assets/images"

collections:
  # -----------------------------------------------------------------
  # Blog posts — one Markdown file per post under content/blog.
  # Staff create/edit posts here; each becomes its own page.
  # -----------------------------------------------------------------
  - name: "blog"
    label: "Blog Posts"
    label_singular: "Blog Post"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sortable_fields: ["date", "title"]
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - { name: "description", label: "Short Description (shown in list & SEO)", widget: "text", required: false }
      - { name: "date", label: "Publish Date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { name: "author", label: "Author", widget: "string", default: "Dr. Mushtaq" }
      - { name: "image", label: "Hero Image (optional)", widget: "image", required: false }
      - { name: "draft", label: "Draft? (hide from site)", widget: "boolean", default: false, required: false }
      - { name: "body", label: "Post Content", widget: "markdown" }
